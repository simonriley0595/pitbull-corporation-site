<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: url('pitbull_corporations_2k_wallpaper.png') no-repeat center center/cover;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-family: Arial;
      background-color: black;
    }
    .content {
      text-align: center;
      background: rgba(0,0,0,0.6);
      padding: 40px 60px;
      border-radius: 15px;
    }
    h1 {
      font-size: 50px;
      margin: 0 0 20px 0;
    }
    .suspended {
      font-size: 40px;
      font-weight: bold;
      color: #ff4444;
      text-transform: uppercase;
      letter-spacing: 3px;
      margin: 0;
      text-shadow: 0 0 10px rgba(255,0,0,0.5);
    }
  </style>
</head>
<body>
  <div class="content">
    <h1>Pitbull Corporations</h1>
    <p class="suspended">⚠️ TEMPORARILY SUSPENDED ⚠️</p>
  </div>
</body>
</html>
