<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: url('pitbull_corporations_2k_wallpaper.png') no-repeat center center/cover;
      font-family: Arial;
      background-color: black;
      position: relative;
      color: white;
    }

    .center-content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      width: 100%;
    }
    
    h1 {
      font-size: 50px;
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    
    .suspended {
      font-size: 40px;
      font-weight: bold;
      color: #ff4444;
      text-transform: uppercase;
      letter-spacing: 3px;
      margin: 10px 0 0 0;
      text-shadow: 0 0 10px rgba(255,0,0,0.5);
    }
    
    /* Bottom text */
    .bottom-text {
      position: absolute;
      bottom: 30px;
      left: 0;
      width: 100%;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: white;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
      background: rgba(0,0,0,0.3);
      padding: 15px 0;
    }
  </style>
</head>
<body>
  <div class="bottom-content">
    <div class="suspended">TEMPORARILY SUSPENDED</div>
  </div>
</body>
</html>
